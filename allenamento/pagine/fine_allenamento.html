<!DOCTYPE html>
<html lang="it">

<head>

    <!-- CSS Personalizzato -->
    <link rel="stylesheet" href="../stili/fine_allenamento.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="container-fluid bruno-ace-regular">
        <div class="row min-vh-100">

            <!-- SIDEBAR -->
            <nav class="col-md-2 d-none d-md-block sidebar py-4">
                <div class="sidebar-sticky">
                    <h2 class="logo px-3 mb-5">Gym<span>Eats</span></h2>

                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="../../profilo.html"><i class="fa-solid fa-user"></i> Profilo</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="allenamento.html"><i class="fa-solid fa-dumbbell"></i>
                                Allenamento</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="../../nutrizione/pagine/nutrizione.html"><i class="fa-solid fa-utensils"></i>

                        </li>
                    </ul>

                    <div class="mt-auto logout-container">
                        <a href="#" class="nav-link"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
                    </div>
                </div>
            </nav>

            <!-- MAIN -->
            <main class="col-md-10 ms-sm-auto px-md-5 py-4 main-container">
                <div class="dashboard-card p-4">

                    <div class="text-center mb-5">

                    </div>

                    <!-- Card allenamento completato -->
                    <div class="row justify-content-center">

                            <div class="card-custom">
                                <h2 class="mb-4">ALLENAMENTO<br>COMPLETATO!</h2>
                                <div class="stats">
                                    <div>
                                        <p>Durata</p>
                                        <p class="stat-value">x</p>
                                    </div>
                                    <div>
                                        <p>Volume</p>
                                        <p class="stat-value">x</p>
                                    </div>
                                    <div>
                                        <p>Serie</p>
                                        <p class="stat-value">x</p>
                                    </div>
                                </div>
                            </div>

                            <div class="mt-4">
                                <button class="back-btn" onclick="history.back()">
                                    <i class="fa-solid fa-arrow-left me-2"></i>Indietro
                                </button>

                        </div>
                    </div>

                </div>
