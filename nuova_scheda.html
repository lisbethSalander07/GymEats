<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymEats - Nuova scheda</title>

    <!-- Google Font Bruno Ace -->
    <link href="https://fonts.googleapis.com/css2?family=Bruno+Ace&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS Personalizzato -->
    <link rel="stylesheet" href="nuova_scheda.css">
</head>
<body class="bruno-ace-regular">

    <!-- NAVBAR -->
    <nav class="container-fluid py-3 px-5 d-flex justify-content-between align-items-center">
        <img src="GymEats-logo.png" class="logo-img" alt="Logo">

        <div class="d-flex gap-3">
            <a href="nutrizione.html" class="nav-pill">Nutrizione</a>
            <a href="allenamento.html" class="nav-pill active">Allenamento</a>
            <a href="profilo.html" class="nav-pill ">Profilo</a>
        </div>
    </nav>

    <!--Nuova scheda -->

    <div class="container py-5">

        <!-- Titolo con modifica -->
        <div class="d-flex align-items-center gap-3 mb-4">
            <div class="section-title">Scheda ×</div>
            <div class="bi bi-pencil edit-icon"></div>
        </div>

        <!-- Card Scheda -->
        <div class="card-custom p-4">

            <div class="text-center mb-4">
                <div class="title-pill small-pill">
                     <span class="close-x">Scheda ×</span>
                </div>
            </div>

            <!-- Tabella esercizio -->
            <div class="exercise-box p-4">

                <div class="d-flex align-items-center mb-3">
                    <div class="bi bi-barbell me-2"></div>
                    <strong>Esercizio</strong>
                </div>

                <table class="table table-borderless align-middle custom-table">
                        <tr>
                            <th>Serie</th>
                            <th>Precedente</th>
                            <th>KG</th>
                            <th>Ripetizioni</th>
                        </tr>
                        <tr>
                            <td>1</td>
                            <td>–</td>
                            <td>–</td>
                            <td>–</td>
                        </tr>
                        <tr>
                            <td>2</td>
                            <td>–</td>
                            <td>–</td>
                            <td>–</td>
                        </tr>
                        <tr>
                            <td>3</td>
                            <td>–</td>
                            <td>–</td>
                            <td>–</td>
                        </tr>
 
                </table>

                <!-- Bottone aggiungi serie -->
                <div class="text-center">
                    <button class="btn add-series-btn">
                        + Aggiungi serie
                    </button>
                </div>

            </div>

            <!-- Bottone aggiungi esercizio -->
            <div class="text-center mt-4">
                <button class="btn add-exercise-btn">
                    + Aggiungi esercizio
                </button>
            </div>

        </div>

        <!-- Salva -->
        <div class="text-center mt-5">
            <button class="btn save-btn px-5">
                Salva
            </button>
        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
